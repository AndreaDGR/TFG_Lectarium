<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectarium - Inicio</title>
    <link rel="stylesheet" href="/frontend/css/styles.css">
    <link rel="stylesheet" href="/frontend/css/index.css">
</head>

<body>
    <div id="header"></div>
    <main>

        <section class="intro">
            <div class="intro-texto">
                <h1 class="intro-titulo">Tu biblioteca, siempre contigo</h1>
                <h3 class="intro-subtitulo">Accede a miles de libros digitales desde cualquier parte y cualquier dispositivo</h3>
                <a href="/frontend/pages/catalogo.html" class="intro-btn">Explorar catálogo</a>
            </div>
            <div class="intro-img">
                <img src="/frontend/assets/img/libros-intro.avif" alt="libros">
            </div>
        </section>

        <div class="separacion"></div>

        <section class="destacados">
            <h2 class="destacados-titulo">Libros destacados</h2>
            <div class="destacados-carrusel carrusel-contenedor">
                <button class="flecha izq">‹</button>
                <div class="carrusel" id="carrusel-destacados"></div>
                <button class="flecha dcha">›</button>
            </div>
        </section>

        <section class="novedades">
            <h2 class="novedades-titulo">Novedades</h2>
            <div class="novedades-carrusel carrusel-contenedor">
                <button class="flecha izq">‹</button>
                <div class="carrusel" id="carrusel-novedades"></div>
                <button class="flecha dcha">›</button>
            </div>
        </section>

    </main>

    <div id="footer"></div>
    <script src="/frontend/js/componentes.js"></script>
    <script src="/frontend/js/index.js"></script>
</body>

</html>
