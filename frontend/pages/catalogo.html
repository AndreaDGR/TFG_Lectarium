<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectarium - Catálogo</title>
    <link rel="stylesheet" href="/frontend/css/styles.css">
    <link rel="stylesheet" href="/frontend/css/catalogo.css">
</head>
<body>
    <div id="header"></div>
    <main class="main-content">

        <section class="buscador">
            <input type="text" id="input-buscador" placeholder="Buscar por título, autor o género..." />
            <button class="btn-buscar" id="btn-buscar">Buscar</button>
        </section>

        <div class="linea-separacion"></div>

        <section class="contenido-libros">
            <select class="filtro" id="filtro-disponibilidad">
                <option value="todos">Todos los libros</option>
                <option value="disponibles">Solo disponibles</option>
            </select>

            <div class="grid-libros" id="grid-libros"></div>

            <div class="paginacion" id="paginacion"></div>
        </section>

    </main>

    <div id="footer"></div>
    <script src="/frontend/js/componentes.js"></script>
    <script src="/frontend/js/catalogo.js"></script>
</body>
</html>
