<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectarium - Iniciar sesión</title>
    <link rel="stylesheet" href="/frontend/css/styles.css">
    <link rel="stylesheet" href="/frontend/css/login-registro.css">
</head>

<body>
    <div id="header"></div>
    <main class="main-content">
        <div class="login-contenedor">
            <h2 class="login-logo">Lectarium</h2>
            <h3 class="login-titulo">Iniciar sesión</h3>
            <form class="login-form">
                <input type="email" id="email" name="email" placeholder="Correo electrónico" required>
                <input type="password" id="contraseña" name="contraseña" placeholder="Contraseña" required>
                <button type="submit">Iniciar sesión</button>
            </form>
        </div>

        <p class="pregunta">¿No tienes una cuenta? <a href="/frontend/pages/registro.html">Regístrate</a></p>

    </main>
    <div id="footer"></div>
    <script src="/frontend/js/componentes.js"></script>
</body>

</html>
